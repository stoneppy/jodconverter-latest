services:
  jodconverter:
    build:
      context: .
      args:
        LO_VERSION: "26.2.2"
        LO_SHORT: "26.2"
        JAVA_VERSION: "21"
    image: jodconverter-libreoffice:latest
    ports:
      - "8080:8080"
    volumes:
      - ./config/application.properties:/etc/app/application.properties
    mem_limit: 512m
    restart: unless-stopped
